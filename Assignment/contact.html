<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#FAF8FF;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.contact-box{
    width:500px;
    background:white;
    padding:40px;
    border-radius:10px;
    border:2px solid #0e4bd8;
}

.contact-box h1{
    margin-bottom:10px;
    color:#0e4bd8;
}

.contact-box p{
    color:gray;
    margin-bottom:25px;
}

input,textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #d1d5db;
    outline:none;
}

button{
    padding:12px 25px;
    border:none;
    background:#0e4bd8;
    color:white;
    font-size:15px;
}

</style>
</head>

<body>

<div class="contact-box">

    <h1>Contact Us</h1>

    <p>We would love to hear from you.</p>

    <input type="text" placeholder="Enter your name">

    <input type="email" placeholder="Enter your email">

    <textarea rows="5" placeholder="Your message"></textarea>

    <button>Send Message</button>

</div>

</body>
</html>
