<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Web Design</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Inter',sans-serif;
        }

        body{
            background:#081120;
        }

        .box{
            min-height:100vh;
            width:100%;
            display:flex;
            justify-content:space-around;
            align-items:center;
            padding:40px;
            gap:50px;
        }

        /* LEFT SECTION */

        .left{
            max-width:550px;
        }

        .left h1{
            color:white;
            font-size:5rem;
            line-height:1.05;
            font-weight:700;
        }

        .left p{
            color:#94A3B8;
            font-size:1.2rem;
            line-height:1.7;
            margin-top:30px;
        }

        /* BUTTONS */

        .but1{
            display:flex;
            gap:20px;
            margin-top:40px;
        }

        #but1{
            background:#3B82F6;
            color:white;
            border:none;
            padding:16px 38px;
            font-size:1rem;
            border-radius:12px;
            cursor:pointer;
            transition:0.3s;
        }

        #but2{
            background:transparent;
            color:white;
            border:2px solid #CBD5E1;
            padding:16px 38px;
            font-size:1rem;
            border-radius:12px;
            cursor:pointer;
            transition:0.3s;
        }

        #but1:hover,
        #but2:hover{
            opacity:0.9;
            transform:translateY(-2px);
        }

        /* RIGHT SECTION */

        .right{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            align-items:center;
            gap:25px;
            max-width:500px;
        }

        .rbox1,.rbox2,.rbox3,.rbox4{
            height:220px;
            width:220px;
            background:#1E293B;
            border-radius:24px;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            font-size:1.5rem;
            font-weight:700;
            transition:0.3s;
        }

        .rbox4{
            background:#2563EB;
        }

        .rbox1:hover,.rbox2:hover,.rbox3:hover,.rbox4:hover{
            transform:translateY(-15px) scale(1.03);
            transition: 0.2s ease;
        }

        /* RESPONSIVE DESIGN */

        @media(max-width:900px){

            .box{
                flex-direction:column;
                text-align:center;
                padding:60px 20px;
            }

            .left h1{
                font-size:3.5rem;
            }

            .left p{
                font-size:1rem;
            }

            .but1{
                justify-content:center;
            }

            .right{
                margin-top:40px;
            }

            .rbox1,
            .rbox2,
            .rbox3,
            .rbox4{
                width:170px;
                height:170px;
                font-size:1.5rem;
            }
        }

        @media(max-width:500px){

            .left h1{
                font-size:2.8rem;
            }

            .right{
                gap:15px;
            }

            .rbox1,.rbox2,.rbox3,.rbox4{
                width:140px;
                height:140px;
                font-size:1.2rem;
            }

            .but1{
                flex-direction:column;
                align-items:center;
            }
        }

    </style>
</head>

<body>

    <div class="box">

        <!-- LEFT CONTENT -->

        <div class="left">

            <h1>
                Learn <br>
                Responsive <br>
                Web Design
            </h1>

            <p>
                This section automatically changes layout on mobile,
                tablet, and desktop using Flexbox, Flex Wrap,
                and Media Queries.
            </p>

            <div class="but1">
                <button id="but1">Explore</button>
                <button id="but2">Learn More</button>
            </div>

        </div>

        <!-- RIGHT CONTENT -->

        <div class="right">

            <div class="rbox1">HTML</div>
            <div class="rbox2">CSS</div>
            <div class="rbox3">Flexbox</div>
            <div class="rbox4">Media Query</div>

        </div>

    </div>

</body>
</html>
