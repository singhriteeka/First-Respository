<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        .box{
            height:140px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 80px;
            animation: bounce 0.8s infinite alternate;

        }
        @keyframes bounce{
            from{
                transform:translateY(0);
            }
            to{
                transform:translateY(450px);
            }
        }
    </style>
</head>
<body>
    <div class="box">
        <img src="ball.png" alt="Image" width="250px">
    </div>
</body>
</html>
