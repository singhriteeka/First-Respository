<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assignment1</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:url("background.jpg");
}

/* MAIN SECTION */

.hero{
    width:100%;
    height:100vh;
    background-image:url("background.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    text-align:center;
    color:white;
}

/* NAVBAR */

nav{
    padding-top:40px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:15px;
    font-size:14px;
    font-weight:bold;
}

/* TEXT BOX */

.box{
    width:550px;
    border:8px solid white;
    margin:180px auto 0;
    padding:40px;
}

.box h1{
    font-size:60px;
    margin-bottom:10px;
}

.box h2{
    font-size:55px;
    margin-bottom:20px;
}

.box p{
    font-size:22px;
}

/* BUTTONS */

.buttons{
    margin-top:40px;
}

.btn1{
    padding:15px 40px;
    background:transparent;
    border:2px solid orange;
    color:white;
    margin-right:15px;
    font-size:15px;
}

.btn2{
    padding:15px 50px;
    background:white;
    border:none;
    color:black;
    font-size:15px;
}

</style>
</head>

<body>

<section class="hero">

    <nav>
        <a href="#">HOME</a>
        <a href="#">PROFILE</a>
        <a href="#">WORK EXPERIENCE</a>
        <a href="#">SKILLS</a>
        <a href="#">INTEREST</a>
        <a href="#">PORTFOLIO</a>
        <a href="#">CONTACT</a>
    </nav>

    <div class="box">
        <h1>HELLO!</h1>
        <h2>I'M RITEEKA SINGH</h2>
        <p>WEB DEVELOPER</p>
    </div>

    <div class="buttons">
        <button class="btn1">DOWNLOAD CV</button>
        <button class="btn2">HIRE ME</button>
    </div>

</section>

</body>
</html>
