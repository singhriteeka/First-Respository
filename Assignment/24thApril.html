<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 1</title>
    <style>
        *{
            margin:0; 
            padding:0;
            box-sizing: border-box;
        }
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
        
        .box{
            height:600px;
            width:800px;
            border:4px solid black;
            display:flex;
            align-items: center;
            justify-content: center;
            border-radius:20px;
        }
        #bx1{
            border:4px solid black;
            height:400px;
            width:600px;
            display:flex;
            align-items: center;
            justify-content: center;
            border-radius:20px;
        }
        #bx2{
            border:4px solid black;
            height:200px;
            width:400px;
            display:flex;
            align-items: center;
            justify-content: center;
            border-radius:20px;
        }
        #bx3{
            border:4px solid black;
            height:100px;
            width:200px;
            border-radius:20px;
        }
    </style>
</head>
<body>
    <div class="box">
        <div id="bx1">
            <div id="bx2">
                <div id="bx3">

                </div>
            </div>
        </div>
    </div>
</body>
</html>
