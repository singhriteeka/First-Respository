<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assignment3</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    font-family: 'Segoe UI', sans-serif;
}

.box{
    height:600px;
    width:1000px;
    display:flex;
    border-radius:20px;
    overflow:hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

.box1{
    width:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
}

.box2{
    width:50%;
    padding:40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    color:white;
    background: 
        linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.8)),
        url('https://images.unsplash.com/photo-1498050108023-c5249f4df085') center/cover no-repeat;

    }

.box11{
    width:300px;
    height:450px;
    border-radius:20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

.box12{
    height:180px;
    width:180px;
    border-radius:50%;
    background: url('riteeka.jpeg') center/cover;
    border:4px solid #22c55e;
    margin-bottom:20px;
}

h1{
    color:#f8fafc;
    font-size:22px;
    margin-bottom:10px;
}

.btn{
    margin-top:15px;
    padding:10px 25px;
    font-size:15px;
    font-weight:500;
    background: linear-gradient(135deg, #22c55e, #4ade80);
    color:black;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform: translateY(-2px);
    box-shadow: 0 0 12px rgba(34,197,94,0.7);
}

.box2 h2{
    font-size:28px;
    margin-bottom:15px;
}

.box2 p{
    color:#cbd5f5;
    line-height:1.6;
    margin-bottom:20px;
}

.btn2{
    width:150px;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#334155;
    color:white;
    cursor:pointer;
}

.btn2:hover{
    background:#475569;
}
</style>
</head>
<body>

<div class="box">

    <!-- LEFT -->
    <div class="box1">
        <div class="box11">
            <div class="box12"></div>
            <h1>Riteeka Singh</h1>
            <button class="btn">Know More</button>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="box2">
        <h2>About Me</h2>
        <p>
            Passionate developer with a strong interest in building
            modern web applications. Skilled in HTML, CSS
            and continuously learning new technologies to improve
            problem-solving and design skills.
        </p>
        <button class="btn2">Explore</button>
    </div>
</div>

</body>
</html>
