<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assigment4.1</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        .card{
            height:450px;
            width:300px;
            margin-top: 50px;
            margin-left: 60px;
            border-radius: 15%;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        #card1{
            height:100%;
            width:100%;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            color:white;
            text-align: center;
            gap:20px;
            position: relative;
        }
        #card1 :hover{
            transform: scale(1.09);
            transition: transform 0.3s ease;
        }
        #card1 button{
            padding:10px 20px;
            border:none;
            border-radius: 5px;
            background-color: #1e293b;
            color:white;
            cursor: pointer;
        }
        #card1 button:hover{
            background-color: aqua;

        }
        
        
    </style>
<body>
    <div class="card">
        <div id="card1">
            <img src="https://upload.wikimedia.org/wikipedia/en/b/bd/Doraemon_character.png" 
                    alt="Doraemon" 
                    style="width:100%; height:200px; border-radius: 20px 20px 0 0;">
            <h1><u>Card 1</u></h1>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. 
                Deleniti aspernatur minima porro pariatur adipisci non molestiae 
                reiciendis modi accusantium! Dolor beatae labore praesentium dicta 
                delectus sed sapiente iste ab eaque.</p>
            <button>Click Me</button>
        </div>
    </div>
</body>
</html>
