<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment1.1</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            height:500px;
            width:400px;
            border:4px solid black;
            cursor: pointer;
            position: relative;
            transform-style:preserve-3d;
        }

        .box:hover{
            animation:rotatey 0.8s;
        }

        @keyframes rotatey{
            from{
                transform:rotateY(0);
            }
            to{
                transform:rotateY(180deg);
            }
        }
        .front,.back{
            height:100%;
            width:100%;
            position:absolute;
            display:flex;
            justify-content:center;
            align-items:center;
            border:4px solid black;
            backface-visibility:hidden;
        }
        .front{
            background:white;
        }

        .back{
            background:aqua;
            transform:rotateY(180deg);
        }


    </style>
</head>
<body>
    <div class="box">
        <div class="front">
            <img src="ball.png" alt="Image">
        </div>
        <div class="back">
            <h1>Back Side</h1>
        </div>
    </div>
</body>
</html>
